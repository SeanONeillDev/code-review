<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Review v2</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1e1e1e;
    --sidebar-bg: #252526;
    --panel-bg: #1e1e1e;
    --border: #3a3a3a;
    --text: #cccccc;
    --text-dim: #888;
    --accent: #569cd6;
    --highlight-bg: rgba(255, 204, 0, 0.15);
    --highlight-border: #ffcc00;
    --pause-bg: #252526;
    --voice-color: #4ec9b0;
    --qa-accent: #ce9178;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Top bar ─────────────────────────────────────── */
  #topbar {
    height: 34px;
    background: #323233;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 10px;
    flex-shrink: 0;
  }
  #progress-label {
    font-size: 11px;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #progress-label.visible { opacity: 1; }
  #progress-bar-track {
    height: 4px;
    background: #2a2a2a;
    flex-shrink: 0;
  }
  #progress-bar-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.6s ease;
  }
  #topbar .logo {
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  #topbar .logo-badge {
    font-size: 10px;
    color: var(--voice-color);
    border: 1px solid var(--voice-color);
    border-radius: 3px;
    padding: 1px 5px;
    opacity: 0.8;
  }
  #status {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: 8px;
  }
  #btn-stop {
    background: transparent;
    border: 1px solid #555;
    border-radius: 3px;
    color: #888;
    font-size: 11px;
    font-family: inherit;
    padding: 3px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  #btn-stop:hover { border-color: #e05252; color: #e05252; }

  #current-file-label {
    margin-left: 10px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: "SF Mono", "Fira Code", monospace;
  }

  /* ── Main layout ─────────────────────────────────── */
  #main {
    flex: 1;
    display: grid;
    grid-template-columns: 220px 1fr;
    grid-template-rows: 1fr 260px;
    min-height: 0;
  }

  /* ── Sidebar ─────────────────────────────────────── */
  #sidebar {
    grid-row: 1 / 3;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 8px 0;
  }
  #sidebar-header {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 4px 12px 8px;
  }
  .tree-item {
    padding: 3px 12px 3px 20px;
    cursor: pointer;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 11.5px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: background 0.1s;
  }
  .tree-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
  .tree-item.active { background: rgba(86, 156, 214, 0.15); color: var(--accent); }

  /* ── Code viewer ─────────────────────────────────── */
  #code-container {
    position: relative;
    overflow: hidden;
  }

  /* ── Diagram overlay ─────────────────────────────── */
  #diagram-overlay {
    position: absolute;
    inset: 0;
    background: #1a1a1a;
    z-index: 10;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    gap: 24px;
  }
  #diagram-overlay.visible { display: flex; }
  #diagram-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.3px;
    align-self: flex-start;
  }
  #diagram-subtitle {
    font-size: 11px;
    color: var(--text-dim);
    align-self: flex-start;
    margin-top: -18px;
    line-height: 1.5;
    max-width: 600px;
  }
  #diagram-content {
    width: 100%;
    max-width: 800px;
    overflow: auto;
  }
  #diagram-content svg { max-width: 100%; height: auto; }
  #diagram-content .mermaid { color: var(--text); }
  #btn-start-tour {
    align-self: flex-end;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 7px 18px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    opacity: 0.9;
    transition: opacity 0.15s;
  }
  #btn-start-tour:hover { opacity: 1; }

  #editor { width: 100%; height: 100%; }

  /* ── Bottom row ──────────────────────────────────── */
  #bottom {
    display: grid;
    grid-template-columns: 1fr 56px 320px;
    border-top: 1px solid var(--border);
  }

  /* Transcript */
  #transcript {
    background: var(--panel-bg);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
  }
  #transcript p { margin-bottom: 6px; }

  /* Thinking indicator */
  .thinking {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-dim);
    font-style: italic;
    font-size: 12px;
    margin-top: 8px;
    padding: 4px 0;
  }
  .thinking-dots {
    display: flex;
    gap: 3px;
    align-items: center;
  }
  .thinking-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    animation: thinking-bounce 1.2s ease-in-out infinite;
    opacity: 0.7;
  }
  .thinking-dot:nth-child(1) { animation-delay: 0s; }
  .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes thinking-bounce {
    0%, 80%, 100% { transform: translateY(0);   opacity: 0.4; }
    40%           { transform: translateY(-5px); opacity: 1.0; }
  }

  /* Word highlight (current speaking word) */
  .word-speaking {
    background: rgba(78, 201, 176, 0.28);
    border-radius: 2px;
    transition: background 0.08s;
  }

  /* Voice wave */
  #voice-panel {
    background: var(--panel-bg);
    border-right: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wave {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 28px;
  }
  .wave-bar {
    width: 3px;
    background: var(--voice-color);
    border-radius: 2px;
    animation: wave-anim 0.8s ease-in-out infinite;
    opacity: 0.85;
  }
  .wave-bar:nth-child(1) { animation-delay: 0s;    height: 8px; }
  .wave-bar:nth-child(2) { animation-delay: 0.1s;  height: 16px; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s;  height: 24px; }
  .wave-bar:nth-child(4) { animation-delay: 0.3s;  height: 16px; }
  .wave-bar:nth-child(5) { animation-delay: 0.4s;  height: 8px; }
  @keyframes wave-anim {
    0%, 100% { transform: scaleY(0.4); opacity: 0.5; }
    50%       { transform: scaleY(1.0); opacity: 1.0; }
  }
  .wave.paused .wave-bar { animation-play-state: paused; opacity: 0.25; }

  /* Q&A panel */
  #qa-panel {
    background: var(--pause-bg);
    display: flex;
    flex-direction: column;
    padding: 12px;
    gap: 8px;
  }
  #qa-question {
    font-size: 12px;
    color: var(--qa-accent);
    font-style: italic;
    line-height: 1.4;
    min-height: 28px;
  }
  #qa-input {
    flex: 0 0 auto;
    background: #2d2d2d;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 6px 8px;
    resize: none;
    outline: none;
    line-height: 1.4;
    height: 64px;
    transition: opacity 0.2s, border-color 0.2s;
  }
  #qa-input.passive { opacity: 0.45; }
  #qa-input.passive:focus { opacity: 1; border-color: var(--accent); }
  #qa-input:focus { border-color: var(--accent); }
  #qa-input::placeholder { color: var(--text-dim); }

  .qa-buttons {
    display: flex;
    gap: 6px;
  }
  .btn {
    padding: 5px 12px;
    border: none;
    border-radius: 3px;
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary   { background: var(--accent); color: #fff; }
  .btn-secondary { background: #3c3c3c; color: var(--text); }

  /* Skip / Back nav buttons — shown during speech */
  #speech-nav {
    display: none;
    gap: 6px;
    align-items: center;
  }
  #speech-nav.visible { display: flex; }
  .nav-btn {
    background: transparent;
    border: 1px solid #444;
    border-radius: 3px;
    color: var(--text-dim);
    font-size: 12px;
    font-family: inherit;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1;
  }
  .nav-btn:hover { border-color: var(--voice-color); color: var(--voice-color); }

  /* Waiting state */
  #qa-waiting {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    font-size: 12px;
    font-style: italic;
  }

  /* Highlight decoration (Monaco) */
  .highlight-line        { background: var(--highlight-bg); }
  .highlight-line-margin { border-left: 3px solid var(--highlight-border); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
</style>
</head>
<body>

<div id="topbar">
  <span class="logo">Code Review</span>
  <span class="logo-badge">Zoe</span>
  <span id="status">Connecting...</span>
  <span id="current-file-label"></span>
  <span id="progress-label" style="margin-left:auto"></span>
  <button id="btn-stop">&#9632; Stop</button>
</div>
<div id="progress-bar-track"><div id="progress-bar-fill"></div></div>

<div id="main">

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">Files</div>
    <div id="file-tree"></div>
  </div>

  <!-- Monaco editor -->
  <div id="code-container">
    <div id="diagram-overlay">
      <div id="diagram-title"></div>
      <div id="diagram-subtitle"></div>
      <div id="diagram-content"><div class="mermaid" id="diagram-mermaid"></div></div>
    </div>
    <div id="editor"></div>
  </div>

  <!-- Bottom row -->
  <div id="bottom">
    <div id="transcript"><span class="init-msg" style="color: var(--text-dim); font-style: italic;">Waiting for review to begin...</span></div>

    <div id="voice-panel">
      <div class="wave paused" id="wave">
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>
    </div>

    <div id="qa-panel">
      <div id="qa-waiting">Review starting soon...</div>
      <div id="qa-question" style="display:none"></div>
      <div id="speech-nav">
        <button class="nav-btn" id="btn-back">⏮ Back</button>
        <button class="nav-btn" id="btn-repeat">↺ Repeat</button>
        <button class="nav-btn" id="btn-pause" style="display:none">⏸</button>
        <button class="nav-btn" id="btn-next">⏭ Skip</button>
      </div>
      <div class="qa-buttons" style="display:none" id="qa-buttons">
        <button class="btn btn-primary" id="btn-send">Ask</button>
      </div>
      <textarea id="qa-input" placeholder="Ask a question anytime..." autocomplete="new-password" style="display:none"></textarea>
    </div>
  </div>

</div>

<!-- Mermaid diagrams -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<!-- Monaco Editor via CDN -->
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.47.0/min/vs/loader.js"></script>
<script>
(function() {
  // ── Mermaid setup ─────────────────────────────────────────────────
  mermaid.initialize({
    startOnLoad: false,
    theme: 'dark',
    themeVariables: {
      background: '#1a1a1a',
      primaryColor: '#1e3a5f',
      primaryTextColor: '#cccccc',
      primaryBorderColor: '#3a3a3a',
      lineColor: '#569cd6',
      secondaryColor: '#252526',
      tertiaryColor: '#2d2d2d',
      edgeLabelBackground: '#1a1a1a',
      fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
      fontSize: '13px',
    },
  });

  // ── Diagram overlay ───────────────────────────────────────────────
  async function showDiagram(title, subtitle, mermaidSrc) {
    const overlay = document.getElementById('diagram-overlay');
    document.getElementById('diagram-title').textContent = title;
    document.getElementById('diagram-subtitle').textContent = subtitle;
    const el = document.getElementById('diagram-mermaid');
    el.removeAttribute('data-processed');
    el.textContent = mermaidSrc;
    overlay.classList.add('visible');
    try {
      await mermaid.run({ nodes: [el] });
    } catch(e) {
      el.textContent = mermaidSrc;
    }
  }

  function hideDiagram() {
    document.getElementById('diagram-overlay').classList.remove('visible');
  }

  // ── Monaco setup ──────────────────────────────────────────────────
  require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.47.0/min/vs' } });

  let editor = null;
  let currentDecorations = [];
  const fileCache = {};

  const EXT_LANG = {
    py: 'python', js: 'javascript', ts: 'typescript', tsx: 'typescript',
    jsx: 'javascript', go: 'go', rs: 'rust', java: 'java', rb: 'ruby',
    cs: 'csharp', cpp: 'cpp', cc: 'cpp', c: 'c', h: 'c', hpp: 'cpp',
    sh: 'shell', bash: 'shell', zsh: 'shell', yaml: 'yaml', yml: 'yaml',
    json: 'json', md: 'markdown', html: 'html', css: 'css', scss: 'scss',
    sql: 'sql', tf: 'hcl', toml: 'ini', ini: 'ini', xml: 'xml',
    swift: 'swift', kt: 'kotlin', php: 'php', r: 'r', lua: 'lua',
  };

  function detectLang(filePath) {
    const ext = filePath.split('.').pop().toLowerCase();
    return EXT_LANG[ext] || 'plaintext';
  }

  require(['vs/editor/editor.main'], function() {
    editor = monaco.editor.create(document.getElementById('editor'), {
      value: '// Waiting for review to begin...',
      language: 'plaintext',
      theme: 'vs-dark',
      readOnly: true,
      minimap: { enabled: true, scale: 1 },
      scrollBeyondLastLine: false,
      fontSize: 13,
      lineNumbers: 'on',
      renderLineHighlight: 'line',
      scrollbar: { vertical: 'visible', horizontal: 'auto', verticalScrollbarSize: 6 },
      wordWrap: 'off',
      folding: true,
      glyphMargin: true,
      lineDecorationsWidth: 6,
    });

    window.addEventListener('resize', () => editor.layout());
    connectWS();
  });

  async function loadFileAndHighlight(file, startLine, endLine, label) {
    if (!editor) return;

    if (fileCache[file] === undefined) {
      try {
        const resp = await fetch(`/file?path=${encodeURIComponent(file)}`);
        fileCache[file] = resp.ok ? await resp.text() : `// Could not load: ${file}`;
      } catch(e) {
        fileCache[file] = `// Error loading file: ${e}`;
      }
    }

    const model = editor.getModel();
    const lang = detectLang(file);
    monaco.editor.setModelLanguage(model, lang);

    if (editor._currentFile !== file) {
      editor.setValue(fileCache[file]);
      editor._currentFile = file;
    }

    currentDecorations = editor.deltaDecorations(currentDecorations, [{
      range: new monaco.Range(startLine, 1, endLine, Number.MAX_SAFE_INTEGER),
      options: {
        isWholeLine: true,
        className: 'highlight-line',
        marginClassName: 'highlight-line-margin',
        overviewRuler: { color: '#ffcc00', position: monaco.editor.OverviewRulerLane.Left },
        minimap: { color: '#ffcc00', position: monaco.editor.MinimapPosition.Inline },
      }
    }]);

    editor.revealLinesInCenter(startLine, endLine, monaco.editor.ScrollType.Smooth);

    const labelEl = document.getElementById('current-file-label');
    labelEl.textContent = label ? `${file}  ·  ${label}` : file;

    document.querySelectorAll('.tree-item').forEach(el => {
      el.classList.toggle('active', el.dataset.path === file);
    });
  }

  // ── File tree ─────────────────────────────────────────────────────
  function renderFileTree(tree) {
    const container = document.getElementById('file-tree');
    container.innerHTML = '';
    tree.sort((a, b) => a.path.localeCompare(b.path));
    tree.forEach(item => {
      const el = document.createElement('div');
      el.className = 'tree-item';
      el.dataset.path = item.path;
      el.title = item.path;
      const parts = item.path.split('/');
      const depth = parts.length - 1;
      el.style.paddingLeft = `${12 + depth * 12}px`;
      el.textContent = parts[parts.length - 1];
      el.addEventListener('click', () => loadFileAndHighlight(item.path, 1, 1, ''));
      container.appendChild(el);
    });
  }

  // ── Transcript with word-span tracking ───────────────────────────
  // Each segment's spoken text is rendered as spans keyed by char offset.
  // word_highlight messages from server carry char_offset + char_len into
  // the spoken text, which maps to a span we can highlight.

  let segmentCharOffset = 0;   // running char count within current segment
  let currentWordEl = null;    // the currently highlighted span
  let transcriptPara = null;   // live <p> being built

  function clearSegmentState() {
    segmentCharOffset = 0;
    currentWordEl = null;
    transcriptPara = null;
  }

  function appendTranscript(text) {
    const container = document.getElementById('transcript');
    if (!transcriptPara) {
      // New segment — clear previous content
      container.innerHTML = '';
      transcriptPara = document.createElement('p');
      container.appendChild(transcriptPara);
    }

    // Split into word/whitespace tokens and render as spans
    const tokens = text.split(/(\s+)/);
    let offset = segmentCharOffset;
    for (const token of tokens) {
      if (/\S/.test(token)) {
        // Word token — wrap in span with char-offset metadata
        const span = document.createElement('span');
        span.dataset.charStart = offset;
        span.dataset.charEnd = offset + token.length;
        span.textContent = token;
        transcriptPara.appendChild(span);
      } else if (token.length > 0) {
        transcriptPara.appendChild(document.createTextNode(token));
      }
      offset += token.length;
    }
    segmentCharOffset += text.length;
    container.scrollTop = container.scrollHeight;
  }

  function finalizeTranscript() {
    // Clear word highlight, keep paragraph
    if (currentWordEl) {
      currentWordEl.classList.remove('word-speaking');
      currentWordEl = null;
    }
    transcriptPara = null;
    segmentCharOffset = 0;
  }

  function highlightWord(charOffset, charLen) {
    if (!transcriptPara) return;
    // Remove previous highlight
    if (currentWordEl) {
      currentWordEl.classList.remove('word-speaking');
      currentWordEl = null;
    }
    // Find the span that contains this char offset
    const end = charOffset + charLen;
    for (const span of transcriptPara.querySelectorAll('span[data-char-start]')) {
      const start = parseInt(span.dataset.charStart);
      const spanEnd = parseInt(span.dataset.charEnd);
      if (start <= charOffset && charOffset < spanEnd) {
        span.classList.add('word-speaking');
        currentWordEl = span;
        break;
      }
    }
  }

  // ── Progress bar ──────────────────────────────────────────────────
  let isLastSection = false;

  function updateProgress(current, total) {
    isLastSection = total > 0 && current === total;
    const pct = total > 0 ? Math.round((current / total) * 100) : 0;
    document.getElementById('progress-bar-fill').style.width = pct + '%';
    const label = document.getElementById('progress-label');
    label.textContent = `Section ${current} of ${total}`;
    label.classList.add('visible');
  }

  // ── Q&A panel ─────────────────────────────────────────────────────
  let passiveShown = false;

  function showPassive() {
    if (passiveShown) return;
    passiveShown = true;
    document.getElementById('qa-waiting').style.display = 'none';
    const input = document.getElementById('qa-input');
    input.style.display = 'block';
    input.classList.add('passive');
    document.getElementById('qa-buttons').style.display = 'flex';
    document.getElementById('speech-nav').classList.add('visible');
    // Initialize to speaking state (Back | Pause | Skip)
    document.getElementById('btn-pause').style.display = '';
    document.getElementById('btn-pause').textContent = '⏸';
    document.getElementById('btn-next').textContent = isLastSection ? '⏹ Finish' : '⏭ Skip';
  }

  // States: speaking | waiting (after speech ends)
  // speaking → Back | ⏸Pause | ⏭Skip  (last: ⏹Finish)
  // waiting  → Back | ⏭Next            (last: ⏹Finish, no pause)
  function setQAMode(active) {
    showPassive();
    const input = document.getElementById('qa-input');
    const question = document.getElementById('qa-question');
    const btnPause = document.getElementById('btn-pause');
    const btnNext  = document.getElementById('btn-next');
    if (active) {
      // Waiting state: speech done, show question + Back + Next/Finish
      question.style.display = 'block';
      btnNext.textContent = isLastSection ? '⏹ Finish' : '⏭ Next';
      btnPause.style.display = 'none';
      input.classList.remove('passive');
      document.getElementById('wave').classList.add('paused');
      input.value = '';
      input.focus();
    } else {
      // Speaking state: Back | Pause | Skip/Finish
      question.style.display = 'none';
      btnNext.textContent = isLastSection ? '⏹ Finish' : '⏭ Skip';
      btnPause.textContent = '⏸';
      btnPause.style.display = '';
      input.classList.add('passive');
      document.getElementById('wave').classList.remove('paused');
    }
  }

  function showPause(question) {
    finalizeTranscript();
    clearSegmentState();
    document.getElementById('qa-question').textContent = question;
    setQAMode(true);
  }

  // ── WebSocket ─────────────────────────────────────────────────────
  let ws = null;
  let fatalError = false;

  function connectWS() {
    if (fatalError) return;
    ws = new WebSocket(`ws://${location.host}/ws`);

    ws.onopen = () => {
      setStatus('Review starting...');
      document.getElementById('wave').classList.remove('paused');
    };

    ws.onmessage = (event) => {
      let msg;
      try { msg = JSON.parse(event.data); } catch(e) { return; }

      switch (msg.type) {
        case 'file_tree':
          renderFileTree(msg.tree);
          break;

        case 'narration_chunk':
          hideThinking();
          showPassive();
          // Always sync btn-next — isLastSection may have changed since first section
          document.getElementById('btn-next').textContent = isLastSection ? '⏹ Finish' : '⏭ Skip';
          if (msg.text) appendTranscript(msg.text);
          if (msg.is_final) {
            finalizeTranscript();
            if (isAnswering) {
              // Answer finished — switch Skip → Next so user knows to continue the tour
              document.getElementById('btn-next').textContent = isLastSection ? '⏹ Finish' : '⏭ Next';
              document.getElementById('btn-pause').style.display = 'none';
              document.getElementById('qa-input').classList.remove('passive');
            }
          }
          break;

        case 'word_highlight':
          highlightWord(msg.char_offset, msg.char_len);
          break;

        case 'progress':
          updateProgress(msg.current, msg.total);
          break;

        case 'question_queued': {
          const qi = document.createElement('p');
          qi.style.cssText = 'color: var(--text-dim); font-style: italic; font-size: 11px; margin-top: 4px;';
          qi.textContent = '↓ Question queued — will answer after this section';
          document.getElementById('transcript').appendChild(qi);
          break;
        }

        case 'diagram':
          showDiagram(msg.title || '', msg.subtitle || '', msg.mermaid || '');
          break;

        case 'highlight':
          hideDiagram();
          loadFileAndHighlight(msg.file, msg.start_line, msg.end_line, msg.label || '');
          break;

        case 'pause':
          showPause(msg.question);
          break;

        case 'qa_mode':
          if (!msg.active) setQAMode(false);
          break;

        case 'tts_paused':
          document.getElementById('btn-pause').textContent = '▶';
          document.getElementById('wave').classList.add('paused');
          break;

        case 'tts_resumed':
          document.getElementById('btn-pause').textContent = '⏸';
          document.getElementById('wave').classList.remove('paused');
          break;

        case 'status':
          setStatus(msg.message);
          break;

        case 'error':
          fatalError = true;
          document.getElementById('wave').classList.add('paused');
          setStatus(`Error: ${msg.message}`);
          showFatalError(msg.message);
          break;

        case 'shutdown':
          fatalError = true;
          document.getElementById('wave').classList.add('paused');
          setStatus('Server stopped.');
          document.getElementById('qa-waiting').textContent = 'Server stopped.';
          document.getElementById('btn-stop').disabled = true;
          break;
      }
    };

    ws.onclose = () => {
      document.getElementById('wave').classList.add('paused');
      if (!fatalError) setStatus('Disconnected — reload to retry');
    };

    ws.onerror = () => ws.close();
  }

  function showFatalError(message) {
    const container = document.getElementById('transcript');
    container.innerHTML = '';
    const el = document.createElement('p');
    el.style.cssText = 'color: #f48771; font-family: "SF Mono", monospace; font-size: 12px; line-height: 1.6;';
    el.textContent = message;
    container.appendChild(el);
    const hint = document.createElement('p');
    hint.style.cssText = 'color: var(--text-dim); font-size: 11px; margin-top: 8px;';
    hint.textContent = 'Make sure the server is running and reload.';
    container.appendChild(hint);
    document.getElementById('qa-waiting').textContent = 'Review stopped.';
  }

  function sendWS(obj) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(obj));
    }
  }

  // ── Stop button ───────────────────────────────────────────────────
  document.getElementById('btn-stop').addEventListener('click', async () => {
    if (!confirm('Stop the server and end this review session?')) return;
    try { await fetch('/api/shutdown', { method: 'POST' }); } catch(e) {}
    document.getElementById('btn-stop').disabled = true;
    setStatus('Stopping...');
  });

  // ── Nav buttons ───────────────────────────────────────────────────
  document.getElementById('btn-back').addEventListener('click', () => {
    sendWS({ type: 'back' });
  });

  document.getElementById('btn-repeat').addEventListener('click', () => {
    sendWS({ type: 'repeat' });
    setQAMode(false);
  });

  document.getElementById('btn-pause').addEventListener('click', () => {
    const btn = document.getElementById('btn-pause');
    if (btn.textContent === '⏸') {
      sendWS({ type: 'pause' });
    } else {
      sendWS({ type: 'resume' });
    }
  });

  document.getElementById('btn-next').addEventListener('click', () => {
    isAnswering = false;
    if (isLastSection) {
      sendWS({ type: 'finish' });
    } else {
      // "Skip" during speech, "Next" during waiting — both advance the tour
      sendWS({ type: 'skip' });
      setQAMode(false);
    }
  });

  // ── Q&A button handlers ───────────────────────────────────────────
  document.getElementById('btn-send').addEventListener('click', sendQuestion);

  document.getElementById('qa-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendQuestion();
    }
  });

  let thinkingEl = null;
  let isAnswering = false;  // true while Claude's Q&A answer is being spoken

  function showThinking() {
    hideThinking();
    const container = document.getElementById('transcript');
    thinkingEl = document.createElement('div');
    thinkingEl.className = 'thinking';
    thinkingEl.innerHTML = '<span class="thinking-dots"><span class="thinking-dot"></span><span class="thinking-dot"></span><span class="thinking-dot"></span></span><span>Claude is thinking…</span>';
    container.appendChild(thinkingEl);
    container.scrollTop = container.scrollHeight;
  }

  function hideThinking() {
    if (thinkingEl) {
      thinkingEl.remove();
      thinkingEl = null;
    }
  }

  function sendQuestion() {
    const input = document.getElementById('qa-input');
    const text = input.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    input.value = '';
    sendWS({ type: 'question', text });
    isAnswering = true;
    setQAMode(false);
    const container = document.getElementById('transcript');
    const q = document.createElement('p');
    q.style.cssText = 'color: #ce9178; font-style: italic; margin-top: 8px;';
    q.textContent = `You: ${text}`;
    container.appendChild(q);
    container.scrollTop = container.scrollHeight;
    transcriptPara = null;
    segmentCharOffset = 0;
    showThinking();
  }

  // ── Helpers ───────────────────────────────────────────────────────
  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

})();
</script>
</body>
</html>
